services:
  - type: web
    name: citywalk-planner
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:route
    startCommand: node server.js
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ARK_API_KEY
        sync: false
      - key: DIANPING_COOKIE
        sync: false
      - key: PORT
        value: 10000
